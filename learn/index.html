  <header class="site-header"><div class="container header-inner"><a href="../index.html" class="brand-lockup" aria-label="suyogjoshi.com - Home"><span class="brand-mark" aria-hidden="true">SJ</span><span class="brand-text">suyogjoshi.com</span></a></div></header>
  <main class="learner-auth-main"><section class="learner-auth-card" aria-labelledby="learner-auth-title">
    <p class="eyebrow">Learner access</p><h1 id="learner-auth-title">Continue with email</h1>
    <p>New and returning learners use the same secure one-time-code journey.</p>
    <div id="learner-auth-status" class="learner-status" role="status" aria-live="polite" aria-atomic="true" hidden></div>
    <form id="learner-email-form" novalidate><div class="form-field"><label for="learner-email">Email address</label><input id="learner-email" type="email" autocomplete="email" required></div><button class="btn btn-primary" type="submit">Continue with email</button></form>
    <form id="learner-otp-form" novalidate hidden><div class="form-field"><label for="learner-otp">6 digit code</label><input id="learner-otp" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" pattern="[0-9]{6}" required></div><div class="learner-form-actions"><button class="btn btn-primary" type="submit">Verify and continue</button><button class="btn btn-secondary" id="learner-resend" type="button">Resend code</button><button class="learner-text-button" id="learner-change-email" type="button">Use another email</button></div></form>
