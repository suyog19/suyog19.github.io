name: Validate public routes

on:
  pull_request:
    branches: [dev, main]
    paths:
      - privacy/**
      - training/policies/privacy/**
      - scripts/validate_public_routes.py
      - .github/workflows/validate-public-routes.yml
  push:
    branches: [dev, main]
    paths:
      - privacy/**
      - training/policies/privacy/**
      - scripts/validate_public_routes.py

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/validate_public_routes.py
