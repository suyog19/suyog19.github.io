name: Validate training commercial content

on:
  pull_request:
    branches: [dev, main]
    paths:
      - data/training-courses.json
      - scripts/validate_training_commercials.py
      - "training/**/*.html"
      - "apply/**/*.html"
      - "my-learning/**/*.html"
      - "privacy/**/*.html"
      - "js/course-application*.js"
      - "js/learner-*.js"
      - "tests/**/*.test.js"
      - .github/workflows/validate-training-commercials.yml
  push:
    branches: [dev, main]
    paths:
      - data/training-courses.json
      - scripts/validate_training_commercials.py
      - "training/**/*.html"
      - "apply/**/*.html"
      - "my-learning/**/*.html"
      - "privacy/**/*.html"
      - "js/course-application*.js"
      - "js/learner-*.js"
      - "tests/**/*.test.js"
      - .github/workflows/validate-training-commercials.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python scripts/validate_training_commercials.py
      - run: node --test tests/*.test.js
